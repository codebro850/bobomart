<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BoboMart — Category</title>

  <!-- Tailwind CSS (CDN — no build step, plays well with .NET Razor) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              green: '#3DA829',
              greenlight: '#EAF6E6',
              orange: '#F5A11A',
              orangelight: '#FEF3E0',
            },
          },
          fontFamily: {
            en: ['Nunito', 'sans-serif'],
            ar: ['Cairo', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- Fonts: Nunito (EN) + Cairo (AR) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/custom.css" />
</head>

<body class="bb-page font-en bg-white text-gray-800 pb-20 md:pb-0">

  <!-- OFFER STRIP -->
  <div class="bb-offer-strip bg-brand-green text-white text-center text-xs sm:text-sm font-bold py-2 px-4">
    <span data-en="🚚 Free delivery on orders above 100 KD"
          data-ar="🚚 توصيل مجاني للطلبات فوق ١٠٠ د.ك">🚚 Free delivery on orders above 100 KD</span>
  </div>

  <!-- HEADER -->
  <header class="bb-header sticky top-0 z-40 bg-white/95 backdrop-blur border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center gap-3 md:gap-6">

      <!-- Logo -->
      <a href="index.html" class="bb-logo shrink-0">
        <img src="images/logo.jpeg" alt="BoboMart" class="h-12 md:h-16 w-auto rounded" />
      </a>

      <!-- Search (grows to fill) -->
      <div class="bb-search flex-1 max-w-xl">
        <div class="flex items-center gap-2 bg-gray-100 rounded-full px-4 py-2">
          <svg class="w-4 h-4 text-gray-400 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
          <input type="text" class="bb-search-input bg-transparent outline-none text-sm w-full placeholder-gray-400"
                 data-placeholder-en="Search groceries..." data-placeholder-ar="ابحث عن البقالة..."
                 placeholder="Search groceries..." />
        </div>
      </div>

      <!-- Desktop nav links -->
      <nav class="bb-nav hidden lg:flex items-center gap-6 text-sm font-bold text-gray-600">
        <a href="index.html" class="hover:text-brand-green" data-en="Home" data-ar="الرئيسية">Home</a>
        <a href="categories.html" class="text-brand-green" data-en="Categories" data-ar="الفئات">Categories</a>
        <a href="orders.html" class="hover:text-brand-green" data-en="Orders" data-ar="الطلبات">Orders</a>
      </nav>

      <!-- Actions: cart, then language toggle -->
      <div class="bb-header-actions flex items-center gap-2 md:gap-3 shrink-0">
        <a href="cart.html" class="bb-cart-btn relative p-2 rounded-full hover:bg-gray-100 transition" aria-label="Cart">
          <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="bb-cart-badge absolute -top-0.5 -right-0.5 bg-brand-orange text-white text-[10px] font-bold rounded-full min-w-[18px] min-h-[18px] flex items-center justify-center">0</span>
        </a>

        <button id="langToggle" class="bb-lang-toggle text-xs font-bold border border-gray-200 rounded-full px-3 py-1.5 hover:border-brand-green hover:text-brand-green transition"
                data-en="عربي" data-ar="EN">عربي</button>
      </div>
    </div>
  </header>

  <!-- ============================================================
       CATEGORY BROWSE — Zepto/Instamart style split view
       Left: single-column subcategory rail (.bb-subcat-rail)
       Right: product grid of the active subcategory (.bb-subcat-products)
       Rendered by js/main.js from ?cat=<id> in the URL.
       .NET later: subcategories + products come from DB;
       the rail and grid are Razor loops, active sub via route.
  ============================================================ -->
  <main class="max-w-7xl mx-auto">

    <!-- Category title bar -->
    <div class="px-4 pt-4 pb-2 flex items-center gap-2 border-b border-gray-100">
      <a href="categories.html" class="bb-back-btn p-1.5 rounded-full hover:bg-gray-100 transition" aria-label="Back to categories">
        <svg class="bb-chevron w-5 h-5 text-gray-700" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
      </a>
      <h1 id="categoryTitle" class="text-lg md:text-xl font-extrabold">Category</h1>
    </div>

    <div class="flex items-stretch">

      <!-- LEFT: subcategory rail (single column) -->
      <aside id="subcatRail"
             class="bb-subcat-rail shrink-0 w-[84px] md:w-56 border-r border-gray-100 bg-gray-50/60
                    sticky self-start overflow-y-auto no-scrollbar py-2">
        <!-- REPEATABLE: .bb-subcat-item — filled by JS / Razor loop -->
      </aside>

      <!-- RIGHT: products of the active subcategory -->
      <section class="flex-1 min-w-0 px-3 md:px-5 py-3">
        <div class="flex items-baseline justify-between mb-3">
          <h2 id="subcatTitle" class="text-sm md:text-base font-extrabold"></h2>
          <span id="subcatCount" class="text-[11px] md:text-xs font-bold text-gray-400"></span>
        </div>

        <div id="subcatProducts"
             class="bb-subcat-products grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-2.5 md:gap-4">
          <!-- REPEATABLE: .bb-product-card — filled by JS / Razor loop -->
        </div>

        <!-- Shown when a subcategory has no products -->
        <p id="subcatEmpty" class="hidden text-center text-sm font-bold text-gray-400 py-16"
           data-en="No items in this section yet" data-ar="لا توجد منتجات في هذا القسم بعد">No items in this section yet</p>
      </section>
    </div>

    <!-- FOOTER (desktop only) -->
    <footer class="bb-footer hidden md:block mt-14 border-t border-gray-100 py-8 text-center text-xs text-gray-400 font-semibold">
      <p data-en="© 2026 BoboMart — Fresh groceries delivered across Kuwait 🇰🇼"
         data-ar="© ٢٠٢٦ بوبومارت — بقالة طازجة تصلك في جميع أنحاء الكويت 🇰🇼">© 2026 BoboMart — Fresh groceries delivered across Kuwait 🇰🇼</p>
    </footer>
  </main>

  <!-- BOTTOM TAB BAR — mobile only -->
  <nav class="bb-tabbar md:hidden fixed bottom-0 inset-x-0 z-50 bg-white border-t border-gray-100 flex justify-around items-center py-2 pb-[max(0.5rem,env(safe-area-inset-bottom))]">
    <a href="index.html" class="bb-tab flex flex-col items-center gap-1 text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span class="text-[10px] font-extrabold" data-en="Home" data-ar="الرئيسية">Home</span>
    </a>
    <a href="categories.html" class="bb-tab flex flex-col items-center gap-1 text-brand-green">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span class="text-[10px] font-extrabold" data-en="Categories" data-ar="الفئات">Categories</span>
    </a>
    <a href="cart.html" class="bb-tab flex flex-col items-center gap-1 text-gray-400 relative">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="text-[10px] font-extrabold" data-en="Cart" data-ar="السلة">Cart</span>
      <span class="bb-cart-badge absolute -top-1.5 right-1 bg-brand-orange text-white text-[9px] font-bold rounded-full min-w-[16px] min-h-[16px] flex items-center justify-center">0</span>
    </a>
    <a href="orders.html" class="bb-tab flex flex-col items-center gap-1 text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.29 7 12 12 20.71 7"/><line x1="12" y1="22" x2="12" y2="12"/></svg>
      <span class="text-[10px] font-extrabold" data-en="Orders" data-ar="الطلبات">Orders</span>
    </a>
    <a href="profile.html" class="bb-tab flex flex-col items-center gap-1 text-gray-400">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="text-[10px] font-extrabold" data-en="Profile" data-ar="حسابي">Profile</span>
    </a>
  </nav>

  <script src="js/main.js"></script>
</body>
</html>
